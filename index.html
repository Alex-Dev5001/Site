<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Cell</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Serif:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <div class="top">
        <p class="welcome"><span class="hello">Bem Vindo à Tech Cell!</span> &nbsp Sua assistência de confiança.</p>
        <div class="e-mail"><img class="email" src="img/email_logo.png" alt="email_logo" /> <p class="email_adress">techcell.ms67@gmail.com</p></div>
        <div class="social_media">
          <p class="follow">Siga-nos</p>
          <img class="logo_insta" src="img/logo_insta.png" alt="instagram_logo" width="35px" />
          <img class="logo_face" src="img/logo_face.png" alt="facebook_logo" width="35px" />
        </div>
      </div>
      <div class="fixed_box">
        <div class="fixed_top">
        <img class="logo_tech" src="img/logo_tech.png" alt="logo" />
        <div class="search_box">
          <div class="text_area">
            <textarea class="search_text" placeholder="Pesquise aqui..."></textarea>
            <div class="magnifying_glass_box">
            <img class="magnifying_glass" src="img/magnifying_glass.png" alt="magnifying_glass" />
            </div>
          </div>
        </div>
        <div class="user_area">
          <div class="user_box"><img class="user_logo" src="img/logo_user.png" alt="user" /></div>
          <div class="link_user">
            <p class="account">Minha Conta</p>
            <p class="login">Entrar/Cadastrar</p>
          </div>
        </div>
        <div class="cart">
          <img class="cart_logo" src="img/cart_logo.png" alt="cart" />
          <p class="amount">5</p>
        </div>
        </div>
        <div class="fixed_bottom">
          <button class="home">INÍCIO</button>
          <button class="cable">CABOS</button>
          <button class="charger">CARREGADORES</button>
          <button class="case">CAPINHAS</button>
          <button class="film">PELÍCULAS</button>
          <button class="assistance">ASSISTÊNCIA TÉCNICA</button>
        </div>
      </div>
      <div class="page_1"></div>
      <div class="page_2"></div>
      <div class="page_3"></div>
      <div class="page_4"></div>
    </div>
    <script src="./scripts.js"></script>
  </body>
</html>
